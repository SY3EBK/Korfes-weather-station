<!DOCTYPE html>
<html>
<head>
    <title>SY3EBK Weather Station</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20; margin: 20px auto; width: 300px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .val { font-size: 2em; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Μετεωρολογικός Σταθμός SY3EBK</h1>
    
    <div class="card">
        <h3>Θερμοκρασία</h3>
        <div id="temp" class="val">--</div><span>°C</span>
    </div>
    
    <div class="card">
        <h3>Υγρασία</h3>
        <div id="hum" class="val">--</div><span>%</span>
    </div>
    
    <div class="card">
        <h3>Πίεση</h3>
        <div id="pres" class="val">--</div><span>hPa</span>
    </div>

    <script>
        const channelID = '3325506';
        const readKey = 'PJD7SOEKQWDTW40B';
        const url = `https://thingspeak.com{channelID}/feeds/last.json?api_key=${readKey}`;

        function updateWeather() {
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('temp').innerText = parseFloat(data.field1).toFixed(1);
                    document.getElementById('hum').innerText = parseFloat(data.field2).toFixed(1);
                    document.getElementById('pres').innerText = parseFloat(data.field3).toFixed(1);
                })
                .catch(err => console.log('Error:', err));
        }

        updateWeather();
        setInterval(updateWeather, 60000); // Ανανέωση κάθε λεπτό
    </script>
</body>
</html>
